version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: cti-postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cti_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cti_password_dev}
      POSTGRES_DB: ${POSTGRES_DB:-cti_ecommerce}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - D:/db-containers/cti-e-comm-db:/var/lib/postgresql/data
      - ../assets/db/lpa_ecomms_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ../assets/db/mock_data.sql:/docker-entrypoint-initdb.d/02-mock-data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cti_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cti-network

networks:
  cti-network:
    driver: bridge
